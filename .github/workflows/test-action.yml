name: Test action
on:
  pull_request:
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'
  push:
    branches: [main]
    paths:
      - 'action.yml'
      - '.github/workflows/test-action.yml'

jobs:
  test:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Run setup-scraps action
        uses: ./
        with:
          version: 1.0.0-rc.1
      - name: Verify scraps is on PATH
        shell: bash
        run: |
          which scraps
          scraps --version
