name: Playwright Test
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'scraps/**'
      - 'assets/**'
      - 'CONTRIBUTING.md'
      - 'LICENSE.md'
      - 'README.md'
      - 'CLAUDE.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'scraps/**'
      - 'assets/**'
      - 'CONTRIBUTING.md'
      - 'LICENSE.md'
      - 'README.md'
      - 'CLAUDE.md'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Setup mise (install scraps)
      uses: jdx/mise-action@v4
      with:
        cache: false
        install_args: "github:boykush/scraps"
    - name: Setup Node.js
      uses: jdx/mise-action@v4
      with:
        working_directory: ./tests/e2e
        install_args: "node"
    - name: Install dependencies
      working-directory: ./tests/e2e
      run: npm ci
    - name: Install Playwright Browsers
      working-directory: ./tests/e2e
      # `--with-deps` runs apt-get for system libs and is the slowest step in
      # this workflow (occasionally tens of minutes). ubuntu-latest already
      # ships most browser deps; if a future browser fails to launch, fall
      # back to a targeted `playwright install --with-deps <browser>` step.
      run: npx playwright install
    - name: Run Playwright tests
      working-directory: ./tests/e2e
      env:
        # Skip auto-install of dev-only tools (rust, cargo-deny, llvm-cov, hk,
        # pkl, markdownlint-cli2) when the webServer subprocess invokes
        # `mise run docs:serve`. Only scraps is required and is installed
        # explicitly by the mise-action step above.
        MISE_AUTO_INSTALL: "false"
      run: npx playwright test