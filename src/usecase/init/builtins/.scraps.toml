# The scraps directory path relative to this .scraps.toml (optional, default=scraps)
# scraps_dir = "scraps"

# The build output directory path relative to this .scraps.toml (optional, default=_site)
# output_dir = "_site"

# The site timezone (optional, default=UTC)
# timezone = "UTC"

# SSG (Static Site Generator) configuration section
# This section is required for build and serve commands
[ssg]
# The site base url (required)
base_url = "https://username.github.io/repository-name/"

# The site title (required)
title = "My Site"

# The site language (compliant with iso639-1, default=en)
# lang_code = "en"

# The site description (optional)
# description = ""

# The site favicon in the form of png file URL (optional)
# favicon = ""

# The site color scheme (optional, default=os_setting, choices=os_setting or only_light or only_dark)
# color_scheme = "os_setting"

# Build a search index with the Fuse JSON and display search UI (optional, default=true, choices=true or false)
# build_search_index = true

# Scraps sort key choice on index page (optional, default=committed_date, choices=committed_date or linked_count)
# sort_key = "committed_date"

# Scraps pagination on index page(optional, default=no pagination)
# paginate_by = 20

# Lint rule configuration (optional)
# Each opt-in rule lives in its own [lint.<rule>] section. Section presence
# enables the rule (enabled defaults to true); set enabled = false to disable
# while preserving the rule's parameters.

# stale_by_git: flag scraps whose latest git commit is older than the threshold.
# Opt-in because it shells out to git per scrap.
# [lint.stale_by_git]
# enabled = true
# threshold_days = 180
